<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>GranCole</title>
</head>
<body>
    <main class="container">
        <section class="left-side">
        </section>

        <section class="right-side">
            <div class="login-box">
                <img src="assets/logo.png" alt="Logo GranCole" class="login-box__logo">

                <h1 class="login-box__title">Bienvenido a GranCole</h1>
                <p class="login-box__subtitle">Inicia sesión para continuar</p>

                <form class="login-form">
                            <label for="usuario">Usuario</label>
                            <input type="text" id="usuario" name="usuario" placeholder="0000000" required>
                        </div>
                        <div class="input-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" name="password" placeholder="****** " required>
                        </div>
                        <div class="form-links">
                            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="login-btn">Iniciar Sesión</button>
                    </form>
                    <div class="admin-link">
                        <span>¿No tienes cuenta? </span>
                        <a href="#">Contacta al administrador</a>
                    </div>
                </div>
                <footer>
                    <small>© 2025 GranCole. Todos los derechos reservados.</small>
                </footer>
            </div>
        </div>
    </div>
</body>
</html>
