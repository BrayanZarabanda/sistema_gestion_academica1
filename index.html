<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GranCole - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="left-side">
        </section>

        <section class="right-side">
            <div class="login-box">
                <img src="https://www.colegiosaucache.cl/images/logos/color_nt_m.png" alt="Logo GranCole" class="login-box__logo">

                <h1 class="login-box__title">Bienvenido a GranCole</h1>
                <p class="login-box__subtitle">Inicia sesión para continuar</p>

                <form class="login-form">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="0000000" required>

                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>

                    <a href="#" class="login-form__link">¿Olvidaste tu contraseña?</a>

                    <button type="submit" class="login-form__button">Iniciar Sesión</button>
                </form>

                <p class="login-box__footer">
                    ¿No tienes cuenta? <a href="#">Contacta al administrador</a>
                </p>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
<script>
    document.querySelector('.login-form').addEventListener('submit', function(event) {
        event.preventDefault();
        alert('Formulario enviado');
    });
