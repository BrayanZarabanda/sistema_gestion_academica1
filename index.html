<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>GranCole</title>
</head>
<body>
    <div class="container">
        <div class="left-panel"></div>
        <div class="right-panel">
            <div class="login-content">
                <img src="https://www.colegiosaucache.cl/images/logos/color_nt_m.png" alt="Logo GranCole" class="logo">
                <h2>Bienvenido a GranCole</h2>
                <p class="subtitle">Inicia sesión para continuar</p>
                <div class="login-card">
                    <h3>Iniciar Sesión</h3>
                    <p class="card-subtitle">Ingresa tus credenciales para acceder al sistema</p>
                    <form>
                        <div class="input-group">
                            <label for="usuario">Usuario</label>
                            <input type="text" id="usuario" name="usuario" placeholder="0000000" required>
                        </div>
                        <div class="input-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" name="password" placeholder="****** " required>
                        </div>
                        <div class="form-links">
                            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="login-btn">Iniciar Sesión</button>
                    </form>
                    <div class="admin-link">
                        <span>¿No tienes cuenta? </span>
                        <a href="#">Contacta al administrador</a>
                    </div>
                </div>
                <footer>
                    <small>© 2025 GranCole. Todos los derechos reservados.</small>
                </footer>
            </div>
        </div>
    </div>
</body>
</html>
